  <rect x="8" y="11" width="40" height="44" rx="6" fill="#ff6e40" opacity="0.3"/>
  <rect x="4" y="4" width="40" height="44" rx="6" fill="#ff6e40"/>
  <!-- Quote lines -->
  <line x1="12" y1="16" x2="36" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="12" y1="24" x2="30" y2="24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="32" x2="34" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Play indicator -->
  <circle cx="18" cy="40" r="3.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
  <polygon points="16.8,38.5 20.5,40 16.8,41.5" fill="white" opacity="0.8"/>
