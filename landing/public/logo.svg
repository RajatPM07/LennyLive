<svg width="200" height="70" viewBox="0 0 200 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked cards -->
  <rect x="10" y="14" width="44" height="52" rx="6" fill="#ff6e40" opacity="0.15" stroke="#ff6e40" stroke-width="1.5"/>
  <rect x="6" y="8" width="44" height="52" rx="6" fill="#ff6e40" opacity="0.3" stroke="#ff6e40" stroke-width="1.5"/>
  <rect x="2" y="2" width="44" height="52" rx="6" fill="#ff6e40"/>
  <!-- Quote lines on top card -->
  <line x1="10" y1="16" x2="38" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="24" x2="32" y2="24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="32" x2="36" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Play/audio indicator -->
  <circle cx="16" cy="44" r="4" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
  <polygon points="14.5,42 19,44 14.5,46" fill="white" opacity="0.8"/>
  <!-- Wordmark -->
  <text x="66" y="30" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1c1c" letter-spacing="-0.5">lenny</text>
  <text x="66" y="54" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ff6e40" letter-spacing="4">LIVE</text>
</svg>
